name: veille-droit-affaires

on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=Europe/Paris date +%H)" = "09" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "Pas 9h a Paris ($(TZ=Europe/Paris date +%H)h) -> on saute."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

