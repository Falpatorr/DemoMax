name: veille-droit-affaires

on:
  schedule:
    - cron: "7 6 * * 1-5"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Récupérer le JORF
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: python scripts/fetch_jorf.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g @anthropic-ai/claude-code

      - name: Rédiger le digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATESTAMP=$(date +%Y%m%d)
          claude -p "Lis data/raw_${DATESTAMP}.json, applique CLAUDE.md, écris output/digest_${DATESTAMP}.html." \
            --allowedTools "Read,Write,Bash" --permission-mode acceptEdits \
            --max-turns 8 --output-format text

      - name: Envoyer
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python scripts/send_digest.py