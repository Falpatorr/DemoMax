name: veille-droit-affaires

on:
  schedule:
    - cron: "0 7 * * 1"   # lundi, heure d'ete : 9h Paris
    - cron: "0 8 * * 1"   # lundi, heure d'hiver : 9h Paris
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=Europe/Paris date +%H)" = "09" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  digest:
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests python-dotenv weasyprint

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g @anthropic-ai/claude-code

      - name: Recuperer le JORF
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: python scripts/fetch_jorf.py

      - name: Recuperer la jurisprudence
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: python scripts/fetch_juri.py

      - name: Recuperation presse (RSS)
        run: python scripts/fetch_presse.py

      - name: Rediger le digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          claude -p "$(cat agent_prompt.md)" --model claude-sonnet-4-6 --allowedTools "Read,Write,Bash" --permission-mode acceptEdits --max-turns 50

      - name: Generer le PDF (edition imprimable)
        run: python scripts/make_pdf.py

      - name: Envoyer le digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python scripts/send_digest.py

      - name: Persister le registre de deduplication
        run: |
          git config user.name "veille-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add state/
          git commit -m "maj registres de deduplication [skip ci]" || echo "rien a committer"
          git push || echo "rien a pousser"

      - name: Alerte en cas d'echec
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: |
          curl -s -X POST https://api.resend.com/emails -H "Authorization: Bearer $RESEND_API_KEY" -H "Content-Type: application/json" -d "{\"from\":\"$DIGEST_FROM\",\"to\":[\"$DIGEST_TO\"],\"subject\":\"[ECHEC] Veille droit des affaires\",\"html\":\"<p>Le pipeline a echoue. Logs GitHub Actions.</p>\"}"